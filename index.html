<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phosphor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { width: 100vw; height: 100vh; }

        /* Label styles for CSS2DRenderer */
        .phosphor-label {
            color: #ff4444;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 3px 10px;
            border: 1px solid currentColor;
            background: rgba(0, 0, 0, 0.7);
            pointer-events: none;
            white-space: nowrap;
        }
        .phosphor-label.style-bracket {
            border: none;
            background: rgba(0, 0, 0, 0.5);
        }
        .phosphor-label.style-bracket::before { content: '\300c  '; }
        .phosphor-label.style-bracket::after { content: '  \300d'; }
        .phosphor-label.style-minimal {
            border: none;
            background: none;
            font-size: 10px;
            opacity: 0.8;
        }

        /* HUD */
        #hud {
            position: fixed;
            bottom: 16px;
            left: 16px;
            color: rgba(255,255,255,0.3);
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="container"></div>
    <div id="hud">PHOSPHOR</div>

    <script type="module">
        import { PhosphorEngine } from './phosphor.js';

        const container = document.getElementById('container');
        const engine = new PhosphorEngine(container);
        let engineStarted = false;

        // ── Categories ──

        const CATEGORIES = [
            {
                name: 'Anime & Sci-Fi',
                collapsed: false,
                scenes: [
                    'nerv', 'nerv-ops', 'terminal-dogma', 'angel-attack',
                    'instrumentality', 'ice', 'matrix', 'theworld',
                    'theworld-v2', 'glitch',
                ],
            },
            {
                name: 'Compositions',
                collapsed: false,
                scenes: [
                    'abyss', 'abyssal', 'wormhole', 'sacred', 'collider',
                    'dune', 'abstract', 'flatland', 'absolutely-right',
                ],
            },
            {
                name: 'Science & Data',
                collapsed: false,
                scenes: [
                    'dna', 'solar-system', 'solar-live', 'solar', 'scale',
                    'star-map', 'galactic', 'circuit', 'circuit-animated',
                    'convergence', 'transformer',
                ],
            },
            {
                name: 'Organic',
                collapsed: false,
                scenes: [
                    'sprout', 'sprout-animated', 'sprout-lines', 'bouquet',
                    'meadow',
                ],
            },
            {
                name: 'Environments',
                collapsed: true,
                scenes: ['command', 'command-v2', 'empire', 'empire-light'],
            },
            {
                name: 'Fundamentals',
                collapsed: true,
                scenes: ['hello', 'primitive-tests'],
            },
        ];

        // ── Inject scene browser into dashboard ──

        function injectSceneBrowser() {
            const pane = container.querySelector('#ph-tab-scenes');
            if (!pane) return;

            CATEGORIES.forEach(cat => {
                const group = document.createElement('div');
                group.className = 'ph-scene-cat' + (cat.collapsed ? ' collapsed' : '');

                const header = document.createElement('div');
                header.className = 'ph-scene-cat-header';
                header.innerHTML = `<span class="ph-scene-chevron">&#9662;</span> ${cat.name}`;
                header.addEventListener('click', () => group.classList.toggle('collapsed'));
                group.appendChild(header);

                const items = document.createElement('div');
                items.className = 'ph-scene-cat-items';

                cat.scenes.forEach(name => {
                    const item = document.createElement('div');
                    item.className = 'ph-scene-item';
                    item.textContent = name;
                    item.dataset.scene = name;
                    item.addEventListener('click', () => {
                        loadScene(`examples/${name}.json`);
                        setActiveScene(name);
                    });
                    items.appendChild(item);
                });

                group.appendChild(items);
                pane.appendChild(group);
            });
        }

        let activeItem = null;

        function setActiveScene(name) {
            if (activeItem) activeItem.classList.remove('active');
            if (!name) { activeItem = null; return; }
            const el = container.querySelector(`.ph-scene-item[data-scene="${name}"]`);
            if (el) {
                el.classList.add('active');
                activeItem = el;
                const cat = el.closest('.ph-scene-cat');
                if (cat && cat.classList.contains('collapsed')) {
                    cat.classList.remove('collapsed');
                }
            } else {
                activeItem = null;
            }
        }

        // ── Scene loading ──

        function loadScene(path) {
            fetch(path)
                .then(r => r.json())
                .then(spec => {
                    engine.loadScene(spec);
                    if (!engineStarted) {
                        engine.animate();
                        engineStarted = true;
                    }
                })
                .catch(err => {
                    console.error('Failed to load scene:', err);
                });
        }

        // ── Init ──

        injectSceneBrowser();

        const params = new URLSearchParams(window.location.search);
        const sceneParam = params.get('scene');

        if (sceneParam) {
            loadScene(sceneParam);
            const name = sceneParam.replace(/^examples\//, '').replace(/\.json$/, '');
            setActiveScene(name);
        } else {
            loadScene('examples/glitch.json');
            setActiveScene('glitch');
        }
    </script>
</body>
</html>
